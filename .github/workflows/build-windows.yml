name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall ai\src

      - name: Build one-file EXE
        run: python -m PyInstaller mario_remake.spec --noconfirm --clean

      - name: Rename build artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -LiteralPath "dist\Mario remake.exe" -Destination "release\Mario remake.exe"
          Copy-Item -LiteralPath "ai\assets\images\mario_remake_cover.png" -Destination "release\mario_remake_cover.png"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: Mario-remake-windows
          path: release/Mario remake.exe
          if-no-files-found: error
          archive: false

      - name: Upload cover artifact
        uses: actions/upload-artifact@v7
        with:
          name: Mario-remake-cover
          path: release/mario_remake_cover.png
          if-no-files-found: error
          archive: false

  build-macos:
    name: Build macOS app
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall ai/src

      - name: Create macOS icon
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_512x512.png
          sips -z 1024 1024 ai/assets/images/mario_remake_cover.png --out build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o ai/assets/images/mario_remake.icns

      - name: Build macOS app
        run: python -m PyInstaller mario_remake_macos.spec --noconfirm --clean

      - name: Zip macOS app
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/Mario remake.app" "release/Mario remake-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: Mario-remake-macos-intel
          path: release/Mario remake-macOS.zip
          if-no-files-found: error
          archive: false

  publish-release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs:
      - build-windows
      - build-macos
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "release-assets\Mario-remake-windows\Mario remake.exe" `
            "release-assets\Mario-remake-macos-intel\Mario remake-macOS.zip" `
            "release-assets\Mario-remake-cover\mario_remake_cover.png" `
            --title "Mario remake ${{ github.ref_name }}" `
            --notes "Desktop builds for Mario remake."

name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall gamemario\src

      - name: Build one-file EXE
        run: python -m PyInstaller mario_remake.spec --noconfirm --clean

      - name: Rename build artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -LiteralPath "dist\Mario remake.exe" -Destination "release\Mario remake.exe"
          Copy-Item -LiteralPath "gamemario\assets\images\mario_remake_cover.png" -Destination "release\mario_remake_cover.png"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: Mario-remake-windows
          path: release/Mario remake.exe
          if-no-files-found: error

      - name: Upload cover artifact
        uses: actions/upload-artifact@v7
        with:
          name: Mario-remake-cover
          path: release/mario_remake_cover.png
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: Mario-remake-windows
          path: release-assets/windows

      - name: Download cover artifact
        uses: actions/download-artifact@v7
        with:
          name: Mario-remake-cover
          path: release-assets/cover

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $tag = "${{ github.ref_name }}"
          $title = "Mario remake $tag"
          $notes = "Desktop builds for Mario remake. Download Mario remake.exe for Windows. The macOS build will be attached automatically when the macOS runner finishes."

          gh release view $tag
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $title --notes $notes
          } else {
            gh release edit $tag --title $title --notes $notes
          }

          gh release upload $tag `
            "release-assets\windows\Mario remake.exe" `
            "release-assets\cover\mario_remake_cover.png" `
            --clobber

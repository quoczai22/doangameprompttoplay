name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Mario remake
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall ai\src

      - name: Build one-file EXE
        run: python -m PyInstaller mario_remake.spec --noconfirm --clean

      - name: Rename build artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -LiteralPath "dist\Mario remake.exe" -Destination "release\Mario remake.exe"
          Copy-Item -LiteralPath "ai\assets\images\mario_remake_cover.png" -Destination "release\mario_remake_cover.png"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: Mario-remake-windows
          path: release/Mario remake.exe
          if-no-files-found: error
          archive: false

      - name: Upload cover artifact
        uses: actions/upload-artifact@v7
        with:
          name: Mario-remake-cover
          path: release/mario_remake_cover.png
          if-no-files-found: error
          archive: false

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "release\Mario remake.exe" `
            "release\mario_remake_cover.png" `
            --title "Mario remake ${{ github.ref_name }}" `
            --notes "Windows one-file build for Mario remake."
